<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  overflow: hidden;
  color: white;
  background: linear-gradient(270deg, #020617, #0f172a, #1e293b);
  background-size: 600% 600%;
  animation: gradientShift 12s ease infinite;
}

/* 🌈 BACKGROUND */
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🔵 BLOBS */
.blob {
  position: absolute;
  width: 400px;
  height: 400px;
  background: #38bdf8;
  filter: blur(150px);
  opacity: 0.25;
  animation: float 10s ease-in-out infinite;
}

.blob:nth-child(1) { top: -100px; left: -100px; }
.blob:nth-child(2) { bottom: -100px; right: -100px; animation-delay: 4s; }

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(40px); }
}

/* LAYOUT */
.container {
  display: flex;
  width: 100%;
  padding: 60px;
  position: relative;
  z-index: 2;
}

/* LEFT */
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.left h1 {
  font-size: 48px;
}

.left span {
  color: #38bdf8;
}

.left p {
  margin-top: 15px;
  color: #94a3b8;
  max-width: 400px;
}

/* MOCKUPS */
.mockups {
  position: relative;
  margin-top: 40px;
  height: 250px;
}

.mock {
  position: absolute;
  width: 280px;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.mock1 {
  top: 0;
  left: 0;
  transform: rotate(-6deg);
  animation: float1 6s ease-in-out infinite;
}

.mock2 {
  top: 40px;
  left: 120px;
  transform: rotate(6deg);
  animation: float2 6s ease-in-out infinite;
}

@keyframes float1 {
  0%,100% { transform: translateY(0px) rotate(-6deg); }
  50% { transform: translateY(-15px) rotate(-6deg); }
}

@keyframes float2 {
  0%,100% { transform: translateY(0px) rotate(6deg); }
  50% { transform: translateY(15px) rotate(6deg); }
}

/* RIGHT */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* GLASS CARD */
.card {
  position: relative;
  width: 360px;
  padding: 35px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}

/* GLASS REFLECTION */
.card::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.2),
    transparent
  );
  transform: rotate(25deg);
  transition: 0.6s;
}

.card:hover::before {
  left: 100%;
}

/* INPUT */
.input-group {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: rgba(255,255,255,0.03);
  color: white;
}

input:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 10px rgba(56,189,248,0.4);
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(56,189,248,0.5);
}
</style>
</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="container">

  <div class="left">
    <h1>Manage your <span>Payments</span><br> smarter.</h1>
    <p>Track POs, payments, and UTRs with a modern intelligent interface.</p>

    <div class="mockups">
      <img src="{{ url_for('static', filename='images/dashboard.png') }}" class="mock mock1">
      <img src="{{ url_for('static', filename='images/payments.png') }}" class="mock mock2">
    </div>
  </div>

  <div class="right">
    <form class="card" method="POST" action="/login">

      <h2 style="margin-bottom:20px;">Sign in</h2>

      {% if error %}
        <p style="color:red;">{{ error }}</p>
      {% endif %}

      <div class="input-group">
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <button>Login</button>

    </form>
  </div>

</div>

</body>
</html>
