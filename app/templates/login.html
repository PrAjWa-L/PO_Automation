<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ProcureIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 360px;
      padding: 24px 16px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .login-icon {
      width: 34px; height: 34px;
      background: var(--text);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .login-app-name { font-size: 17px; font-weight: 600; }
    .login-app-sub  { font-size: 11px; color: var(--text3); }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 26px 24px 22px;
      box-shadow: var(--sh-md);
    }

    .login-heading {
      font-size: 15.5px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .login-sub {
      font-size: 12.5px;
      color: var(--text3);
      margin-bottom: 22px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 11px;
      font-size: 13.5px;
    }

    .error-msg {
      background: var(--red-bg);
      border: 1px solid var(--red-b);
      color: var(--red);
      border-radius: var(--r);
      padding: 9px 12px;
      font-size: 12.5px;
      margin-bottom: 14px;
    }

    .btn-login {
      width: 100%;
      padding: 9px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-size: 13.5px;
      font-weight: 500;
      font-family: var(--font-sans);
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .85; }

    .login-footer {
      text-align: center;
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-brand">
      <div class="login-icon">
        <svg viewBox="0 0 16 16" fill="white" width="15" height="15" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1"/>
          <rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/>
          <rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
      </div>
      <div>
        <div class="login-app-name">ProcureIQ</div>
        <div class="login-app-sub">CUTIS Hospital · Bengaluru</div>
      </div>
    </div>

    <div class="login-card">
      <div class="login-heading">Sign in</div>
      <div class="login-sub">Enter your credentials to continue</div>

      {% if error %}
      <div class="error-msg" role="alert">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next }}">

        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 autocomplete="username" autofocus placeholder="e.g. accounts">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" placeholder="••••••••">
        </div>

        <button type="submit" class="btn-login">Sign in →</button>
      </form>
    </div>

    <div class="login-footer">Internal use only — CUTIS Hospital</div>
  </div>
</body>
</html>
